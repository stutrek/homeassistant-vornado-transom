name: Release

on:
  push:
    tags:
      - 'v*'

# One release at a time per ref. Cancel-in-progress=false so a re-pushed
# tag doesn't kill an in-flight release; instead the second run queues.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag matches manifest.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION="$(jq -r .version custom_components/vornado_transom/manifest.json)"
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (=> $TAG_VERSION) does not match manifest.json version $MANIFEST_VERSION"
            exit 1
          fi

      - name: Validate JSON and Python sources
        run: |
          for f in hacs.json custom_components/vornado_transom/manifest.json custom_components/vornado_transom/translations/*.json; do
            jq empty "$f" || exit 1
          done
          python3 -m compileall -q custom_components/vornado_transom

      - name: Zip component
        run: |
          cd custom_components/vornado_transom
          zip -r ../../vornado_transom.zip .

      - name: Build release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:'- %h %s' "${PREV_TAG}..HEAD")
          else
            COMMITS=$(git log --pretty=format:'- %h %s' HEAD)
          fi
          cat > release-notes.md <<EOF
          ## Commits

          $COMMITS
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: vornado_transom.zip
          body_path: release-notes.md
